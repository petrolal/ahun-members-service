name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - master

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'casa-ahun' }}
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY_REPO: ahun-members-service-repo
  SERVICE_NAME: ahun-members-service
  HAVE_GCP_SECRETS: ${{ secrets.GCP_SA_KEY != '' || secrets.GOOGLE_CREDENTIALS != '' || secrets.GCP_CREDENTIALS != '' }}

jobs:
  test-build-deploy:
    name: Test, Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout codebase
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java JDK 25
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Grant execute permission for gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Run tests
      - name: Run Test Suite
        run: ./gradlew test --no-daemon

      # 5. Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        if: ${{ env.HAVE_GCP_SECRETS == 'true' }}
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY || secrets.GOOGLE_CREDENTIALS || secrets.GCP_CREDENTIALS }}

      # 6. Set up Cloud SDK
      - name: Set up Cloud SDK
        if: ${{ env.HAVE_GCP_SECRETS == 'true' }}
        uses: google-github-actions/setup-gcloud@v2

      # 7. Configure Docker to use Artifact Registry credentials
      - name: Configure Docker
        if: ${{ env.HAVE_GCP_SECRETS == 'true' }}
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # 8. Set up Docker Buildx (for building images efficiently)
      - name: Set up Docker Buildx
        if: ${{ env.HAVE_GCP_SECRETS == 'true' }}
        uses: docker/setup-buildx-action@v3

      # 9. Build and Push Container Image
      - name: Build and Push Container Image
        if: ${{ env.HAVE_GCP_SECRETS == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 10. Deploy container to Google Cloud Run
      - name: Deploy to Cloud Run
        if: ${{ env.HAVE_GCP_SECRETS == 'true' }}
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --quiet
